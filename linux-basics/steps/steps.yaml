steps:
  - title: "Step 1: Navigate to Working Directory"
    text: |
      Navigate to the lab directory.

      ```
      cd /root/devops-lab
      ```
    verify: |
      bash /root/verify.sh step1

  - title: "Step 2: List Files"
    text: |
      List all files in the directory.

      ```
      ls -l
      ```
    verify: |
      bash /root/verify.sh step2

  - title: "Step 3: Check Disk Usage"
    text: |
      Check disk usage and identify large files.

      ```
      df -h
      du -sh *
      ```
    verify: |
      bash /root/verify.sh step3

  - title: "Step 4: Find High CPU Process"
    text: |
      Identify the process consuming high CPU.

      ```
      top
      ```
      OR
      ```
      htop
      ```
    verify: |
      bash /root/verify.sh step4

  - title: "Step 5: Kill High CPU Process"
    text: |
      Kill the process consuming CPU.

      ```
      kill -9 <PID>
      ```
    verify: |
      bash /root/verify.sh step5

  - title: "Step 6: Fix Disk Space"
    text: |
      Remove the large file.

      ```
      rm -f /root/devops-lab/bigfile.log
      ```
    verify: |
      bash /root/verify.sh step6

  - title: "Step 7: Fix Permissions"
    text: |
      Create a secure file with proper permissions.

      ```
      touch secure.txt
      chmod 600 secure.txt
      ```
    verify: |
      bash /root/verify.sh step1
